<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">修改密码 - 校园失物招领平台</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #6c757d;
            --success-color: #1cc88a;
            --danger-color: #e74a3b;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f9fc 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .password-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .password-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
            background-color: white;
            padding: 2.5rem;
        }
        
        .password-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .password-logo {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .password-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .password-subtitle {
            color: var(--secondary-color);
            font-size: 0.9rem;
        }
        
        .form-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
        }
        
        .btn-change-password {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-change-password:hover {
            background-color: #224abe;
            border-color: #224abe;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--secondary-color);
        }
        
        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .alert {
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .input-group-text {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-right: none;
        }
        
        .input-group .form-control {
            border-left: none;
        }
        
        .password-strength {
            height: 5px;
            border-radius: 2.5px;
            margin-top: 5px;
            background-color: #eee;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background-color 0.3s;
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="password-card">
            <!-- 头部 -->
            <div class="password-header">
                <div class="password-logo">
                    <i class="fas fa-key"></i>
                </div>
                <h2 class="password-title">修改密码</h2>
                <p class="password-subtitle">为了您的账户安全，请定期修改密码</p>
            </div>
            
            <!-- 错误提示区域 -->
            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
            <div id="successAlert" class="alert alert-success d-none" role="alert"></div>
            
            <!-- 修改密码表单 -->
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="oldPassword" class="form-label">
                        <i class="fas fa-lock me-1"></i>当前密码
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key"></i></span>
                        <input type="password" class="form-control" id="oldPassword" name="oldPassword" 
                               placeholder="请输入当前密码" required>
                        <button class="btn btn-outline-secondary" type="button" id="toggleOldPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="newPassword" class="form-label">
                        <i class="fas fa-lock me-1"></i>新密码
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key"></i></span>
                        <input type="password" class="form-control" id="newPassword" name="newPassword" 
                               placeholder="请输入新密码（至少6位）" required>
                        <button class="btn btn-outline-secondary" type="button" id="toggleNewPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrengthBar"></div>
                    </div>
                    <div class="form-text">密码强度：<span id="passwordStrengthText">弱</span></div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">
                        <i class="fas fa-lock me-1"></i>确认新密码
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key"></i></span>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                               placeholder="请再次输入新密码" required>
                        <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="passwordMatch" class="form-text"></div>
                </div>
                
                <button type="submit" class="btn btn-change-password" id="changePasswordBtn">
                    <span id="changeText">确认修改</span>
                    <span id="changeSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>
            
            <!-- 返回链接 -->
            <div class="back-link">
                <a th:href="@{/user/profile}"><i class="fas fa-arrow-left me-1"></i>返回个人中心</a>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery（简化AJAX操作） -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // 切换密码显示
            function setupPasswordToggle(buttonId, inputId) {
                $(buttonId).click(function() {
                    const passwordInput = $(inputId);
                    const icon = $(this).find('i');
                    if (passwordInput.attr('type') === 'password') {
                        passwordInput.attr('type', 'text');
                        icon.removeClass('fa-eye').addClass('fa-eye-slash');
                    } else {
                        passwordInput.attr('type', 'password');
                        icon.removeClass('fa-eye-slash').addClass('fa-eye');
                    }
                });
            }
            
            setupPasswordToggle('#toggleOldPassword', '#oldPassword');
            setupPasswordToggle('#toggleNewPassword', '#newPassword');
            setupPasswordToggle('#toggleConfirmPassword', '#confirmPassword');
            
            // 新密码强度检测
            $('#newPassword').on('input', function() {
                const password = $(this).val();
                let strength = 0;
                let text = '弱';
                let color = '#e74a3b'; // 红色
                
                if (password.length >= 6) strength++;
                if (password.length >= 8) strength++;
                if (/[A-Z]/.test(password)) strength++;
                if (/[0-9]/.test(password)) strength++;
                if (/[^A-Za-z0-9]/.test(password)) strength++;
                
                if (strength <= 2) {
                    text = '弱';
                    color = '#e74a3b'; // 红色
                } else if (strength <= 4) {
                    text = '中等';
                    color = '#f6c23e'; // 黄色
                } else {
                    text = '强';
                    color = '#1cc88a'; // 绿色
                }
                
                const width = (strength / 5) * 100;
                $('#passwordStrengthBar').css({
                    'width': width + '%',
                    'background-color': color
                });
                $('#passwordStrengthText').text(text).css('color', color);
            });
            
            // 密码匹配检测
            function checkPasswordMatch() {
                const newPassword = $('#newPassword').val();
                const confirmPassword = $('#confirmPassword').val();
                const matchDiv = $('#passwordMatch');
                
                if (confirmPassword === '') {
                    matchDiv.text('').removeClass('text-danger text-success');
                    return false;
                }
                
                if (newPassword === confirmPassword) {
                    matchDiv.text('密码匹配 ✓').addClass('text-success').removeClass('text-danger');
                    return true;
                } else {
                    matchDiv.text('密码不匹配 ✗').addClass('text-danger').removeClass('text-success');
                    return false;
                }
            }
            
            $('#newPassword, #confirmPassword').on('input', checkPasswordMatch);
            
            // 表单提交
            $('#changePasswordForm').submit(function(e) {
                e.preventDefault();
                
                // 验证表单
                if (!checkPasswordMatch()) {
                    showError('两次输入的新密码不一致');
                    return;
                }
                
                // 显示加载状态
                const changeBtn = $('#changePasswordBtn');
                const changeText = $('#changeText');
                const changeSpinner = $('#changeSpinner');
                
                changeBtn.prop('disabled', true);
                changeText.text('修改中...');
                changeSpinner.removeClass('d-none');
                
                // 收集表单数据
                const formData = {
                    oldPassword: $('#oldPassword').val(),
                    newPassword: $('#newPassword').val(),
                    confirmPassword: $('#confirmPassword').val()
                };
                
                // 发送修改密码请求
                $.ajax({
                    url: '/user/change-password',
                    type: 'POST',
                    contentType: 'application/x-www-form-urlencoded',
                    data: formData,
                    success: function(response) {
                        if (response.success) {
                            showSuccess('密码修改成功！即将返回个人中心...');
                            // 3秒后跳转到个人中心
                            setTimeout(function() {
                                window.location.href = '/user/profile?passwordChanged=true';
                            }, 2000);
                        } else {
                            showError(response.message || '密码修改失败，请稍后重试');
                            resetChangeButton();
                        }
                    },
                    error: function(xhr, status, error) {
                        showError('网络错误，请检查网络连接');
                        resetChangeButton();
                    }
                });
                
                function resetChangeButton() {
                    changeBtn.prop('disabled', false);
                    changeText.text('确认修改');
                    changeSpinner.addClass('d-none');
                }
            });
            
            // 显示错误信息
            function showError(message) {
                $('#successAlert').addClass('d-none');
                $('#errorAlert').removeClass('d-none').text(message);
                $('#errorAlert')[0].scrollIntoView({ behavior: 'smooth' });
            }
            
            // 显示成功信息
            function showSuccess(message) {
                $('#errorAlert').addClass('d-none');
                $('#successAlert').removeClass('d-none').text(message);
                $('#successAlert')[0].scrollIntoView({ behavior: 'smooth' });
            }
        });
    </script>
</body>
</html>
