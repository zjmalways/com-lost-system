<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">物品详情 - 校园失物招领平台</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #6c757d;
            --success-color: #1cc88a;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fc;
            color: #333;
        }
        
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        
        .detail-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .item-badge {
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.375rem 1rem;
            border-radius: 2rem;
            margin-right: 0.5rem;
        }
        
        .badge-lost {
            background-color: rgba(231, 74, 59, 0.1);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }
        
        .badge-found {
            background-color: rgba(28, 200, 138, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }
        
        .badge-type {
            background-color: rgba(78, 115, 223, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }
        
        .badge-resolved {
            background-color: rgba(108, 117, 125, 0.1);
            color: var(--secondary-color);
            border: 1px solid var(--secondary-color);
        }
        
        .detail-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            background-color: white;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        
        .detail-header {
            padding: 2rem;
            border-bottom: 1px solid #e3e6f0;
            background-color: #f8f9fc;
        }
        
        .item-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            color: #333;
        }
        
        .detail-body {
            padding: 2rem;
        }
        
        .detail-section {
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1rem;
            border-bottom: 2px solid #f8f9fc;
            padding-bottom: 0.5rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .info-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(78, 115, 223, 0.1);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-right: 1rem;
            flex-shrink: 0;
        }
        
        .info-content h5 {
            color: var(--primary-color);
            margin-bottom: 0.25rem;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .info-content p {
            color: #666;
            margin: 0;
            line-height: 1.5;
        }
        
        .description-box {
            background-color: #f8f9fc;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        
        .description-box p {
            line-height: 1.8;
            color: #555;
        }
        
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .gallery-image {
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid #e3e6f0;
            transition: transform 0.3s;
        }
        
        .gallery-image:hover {
            transform: scale(1.05);
        }
        
        .gallery-image img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e3e6f0;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            background-color: #224abe;
            border-color: #224abe;
        }
        
        .btn-outline-primary {
            color: var(--primary-color);
            border-color: var(--primary-color);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
        }
        
        .btn-outline-primary:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        
        .btn-success {
            background-color: var(--success-color);
            border-color: var(--success-color);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
        }
        
        .btn-success:hover {
            background-color: #17a673;
            border-color: #17a673;
        }
        
        .btn-danger {
            background-color: var(--danger-color);
            border-color: var(--danger-color);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
        }
        
        .btn-danger:hover {
            background-color: #d52a1b;
            border-color: #d52a1b;
        }
        
        .stats-bar {
            display: flex;
            gap: 2rem;
            padding: 1rem 2rem;
            background-color: #f8f9fc;
            border-top: 1px solid #e3e6f0;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            color: var(--secondary-color);
        }
        
        .stat-item i {
            margin-right: 0.5rem;
            font-size: 1.25rem;
        }
        
        .stat-item .count {
            font-weight: 600;
            font-size: 1.25rem;
            color: #333;
            margin-right: 0.25rem;
        }
        
        .comment-section {
            margin-top: 2rem;
        }
        
        .comment-form {
            margin-bottom: 2rem;
        }
        
        .comment-card {
            border: 1px solid #e3e6f0;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background-color: white;
        }
        
        .comment-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .comment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-right: 1rem;
        }
        
        .comment-author {
            font-weight: 600;
            color: #333;
        }
        
        .comment-time {
            color: var(--secondary-color);
            font-size: 0.875rem;
        }
        
        .comment-content {
            line-height: 1.6;
            color: #555;
        }
        
        .no-images {
            text-align: center;
            padding: 2rem;
            color: var(--secondary-color);
            background-color: #f8f9fc;
            border-radius: 0.75rem;
            border: 2px dashed #e3e6f0;
        }
        
        .back-button {
            margin-bottom: 1.5rem;
        }
        
        .contact-info {
            background-color: #f8f9fc;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-top: 1rem;
            border-left: 4px solid var(--primary-color);
        }
        
        .contact-info h5 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand text-primary" href="/">
                <i class="fas fa-search me-2"></i>校园失物招领
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/items">失物招领</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">关于我们</a>
                    </li>
                    <!-- 根据登录状态显示不同菜单 -->
                    <li class="nav-item" th:if="${isLoggedIn}">
                        <a class="nav-link" href="/items/publish">
                            <i class="fas fa-plus me-1"></i>发布
                        </a>
                    </li>
                    <li class="nav-item" th:if="${isLoggedIn}">
                        <a class="nav-link" href="/items/my">
                            <i class="fas fa-list me-1"></i>我的发布
                        </a>
                    </li>
                    <li class="nav-item" th:if="${isLoggedIn}">
                        <a class="nav-link" href="/user/profile">
                            <i class="fas fa-user me-1"></i>
                            <span th:text="${nickname}">用户</span>
                        </a>
                    </li>
                    <li class="nav-item" th:if="${isLoggedIn}">
                        <a class="nav-link" href="/user/logout">退出登录</a>
                    </li>
                    <li class="nav-item" th:unless="${isLoggedIn}">
                        <a class="nav-link" href="/user/login">登录</a>
                    </li>
                    <li class="nav-item" th:unless="${isLoggedIn}">
                        <a class="nav-link" href="/user/register">注册</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="detail-container">
        <!-- 返回按钮 -->
        <div class="back-button">
            <a href="/items" class="btn btn-outline-primary">
                <i class="fas fa-arrow-left me-2"></i>返回列表
            </a>
        </div>
        
        <!-- 物品详情卡片 -->
        <div class="detail-card">
            <!-- 头部 -->
            <div class="detail-header">
                <div class="d-flex align-items-center mb-3">
                    <span class="item-badge" 
                          th:classappend="${item.publishType == 0} ? 'badge-lost' : 'badge-found'"
                          th:text="${item.publishType == 0} ? '丢失' : '捡到'">
                        丢失
                    </span>
                    <span class="item-badge badge-type" th:text="${item.itemTypeName}">
                        证件
                    </span>
                    <span th:if="${item.status == 1}" class="item-badge badge-resolved">
                        已处理
                    </span>
                </div>
                <h1 class="item-title" th:text="${item.title}">物品标题</h1>
                <div class="text-muted">
                    <i class="fas fa-user me-1"></i>
                    <span th:text="${item.publisherName}">发布人</span>
                    <span class="mx-2">•</span>
                    <i class="fas fa-clock me-1"></i>
                    <span th:text="${#temporals.format(item.createTime, 'yyyy-MM-dd HH:mm')}">发布时间</span>
                </div>
            </div>
            
            <!-- 主体 -->
            <div class="detail-body">
                <!-- 基本信息 -->
                <div class="detail-section">
                    <h3 class="section-title">基本信息</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-icon">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div class="info-content">
                                <h5>地点</h5>
                                <p th:text="${item.location}">未知地点</p>
                            </div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-icon">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div class="info-content">
                                <h5>时间</h5>
                                <p th:text="${#temporals.format(item.eventTime, 'yyyy-MM-dd HH:mm')}">未知时间</p>
                            </div>
                        </div>
                        
                        <div class="info-item" th:if="${item.publishType == 1 and item.storageLocation != null}">
                            <div class="info-icon">
                                <i class="fas fa-warehouse"></i>
                            </div>
                            <div class="info-content">
                                <h5>存放地点</h5>
                                <p th:text="${item.storageLocation}">未指定</p>
                            </div>
                        </div>
                        
                        <div class="info-item" th:if="${item.features != null and !item.features.isEmpty()}">
                            <div class="info-icon">
                                <i class="fas fa-tag"></i>
                            </div>
                            <div class="info-content">
                                <h5>特征</h5>
                                <p th:text="${item.features}">无特征描述</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 描述 -->
                <div class="detail-section" th:if="${item.description != null and !item.description.isEmpty()}">
                    <h3 class="section-title">详细描述</h3>
                    <div class="description-box">
                        <p th:text="${item.description}">暂无详细描述</p>
                    </div>
                </div>
                
                <!-- 图片 -->
                <div class="detail-section" th:if="${item.images != null and !item.images.isEmpty()}">
                    <h3 class="section-title">相关图片</h3>
                    <div class="image-gallery" id="imageGallery">
                        <!-- 图片将通过JavaScript动态加载 -->
                    </div>
                </div>
                
                <div class="detail-section" th:unless="${item.images != null and !item.images.isEmpty()}">
                    <h3 class="section-title">相关图片</h3>
                    <div class="no-images">
                        <i class="fas fa-image fa-3x mb-3" style="color: #e3e6f0;"></i>
                        <p>暂无图片</p>
                    </div>
                </div>
                
                <!-- 联系方式 -->
                <div class="detail-section" th:if="${item.contact != null and !item.contact.isEmpty()}">
                    <h3 class="section-title">联系方式</h3>
                    <div class="contact-info">
                        <h5>联系发布人</h5>
                        <p th:text="${item.contact}">无联系方式</p>
                        <small class="text-muted">请文明沟通，注意保护个人隐私</small>
                    </div>
                </div>
            </div>
            
            <!-- 统计栏 -->
            <div class="stats-bar">
                <div class="stat-item">
                    <i class="fas fa-eye" style="color: var(--primary-color);"></i>
                    <span class="count" th:text="${item.viewCount}">0</span>
                    <span>次浏览</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-heart" style="color: var(--danger-color);"></i>
                    <span class="count" th:text="${item.collectCount}">0</span>
                    <span>次收藏</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-comment" style="color: var(--success-color);"></i>
                    <span class="count" th:text="${item.commentCount}">0</span>
                    <span>条评论</span>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="detail-body">
                <div class="action-buttons">
                    <!-- 收藏按钮（未来功能） -->
                    <button class="btn btn-outline-primary" id="collectBtn">
                        <i class="far fa-heart me-2"></i>收藏
                    </button>
                    
                    <!-- 分享按钮（未来功能） -->
                    <button class="btn btn-outline-secondary" id="shareBtn">
                        <i class="fas fa-share-alt me-2"></i>分享
                    </button>
                    
                    <!-- 发布者操作按钮 -->
                    <div th:if="${isPublisher}">
                        <!-- 更新状态按钮 -->
                        <button class="btn btn-success" id="updateStatusBtn" 
                                th:if="${item.status == 0}"
                                th:data-item-id="${item.itemId}">
                            <i class="fas fa-check me-2"></i>标记为已处理
                        </button>
                        
                        <button class="btn btn-secondary" id="updateStatusBtn"
                                th:if="${item.status == 1}"
                                th:data-item-id="${item.itemId}">
                            <i class="fas fa-times me-2"></i>标记为未处理
                        </button>
                        
                        <!-- 编辑按钮 -->
                        <a th:href="@{/items/edit/{id}(id=${item.itemId})}" class="btn btn-primary">
                            <i class="fas fa-edit me-2"></i>编辑
                        </a>
                        
                        <!-- 删除按钮 -->
                        <button class="btn btn-danger" id="deleteBtn" th:data-item-id="${item.itemId}">
                            <i class="fas fa-trash me-2"></i>删除
                        </button>
                    </div>
                    
                    <!-- 管理员操作按钮（未来功能） -->
                    <div th:if="${role == 1 and not isPublisher}">
                        <button class="btn btn-warning">
                            <i class="fas fa-flag me-2"></i>标记违规
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 评论区域（未来功能） -->
        <!--
        <div class="comment-section detail-card">
            <h3 class="section-title" style="padding: 1.5rem 2rem 0;">评论</h3>
            <div class="detail-body">
                <div class="comment-form">
                    <textarea class="form-control" rows="3" placeholder="请输入评论内容..." id="commentInput"></textarea>
                    <div class="d-flex justify-content-end mt-2">
                        <button class="btn btn-primary" id="submitCommentBtn">提交评论</button>
                    </div>
                </div>
                
                <div id="commentsContainer">
                    <div class="comment-card">
                        <div class="comment-header">
                            <div class="comment-avatar">张</div>
                            <div>
                                <div class="comment-author">张三</div>
                                <div class="comment-time">2026-04-17 15:30</div>
                            </div>
                        </div>
                        <div class="comment-content">
                            这个物品我好像在图书馆见过，请联系我！
                        </div>
                    </div>
                </div>
            </div>
        </div>
        -->
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery（简化AJAX操作） -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        $(document).ready(function() {
            console.log('物品详情页面已加载');
            
            // 处理图片显示
            const images = '[[${item.images}]]';
            if (images && images.trim() !== '') {
                const imageArray = images.split(',');
                const gallery = $('#imageGallery');
                
                imageArray.forEach(function(imageUrl) {
                    const trimmedUrl = imageUrl.trim();
                    if (trimmedUrl) {
                        const imgElement = `
                            <div class="gallery-image">
                                <img src="${trimmedUrl}" alt="物品图片" onclick="openImageModal('${trimmedUrl}')">
                            </div>
                        `;
                        gallery.append(imgElement);
                    }
                });
            }
            
            // 更新状态按钮点击事件
            $('#updateStatusBtn').on('click', function() {
                const itemId = $(this).data('item-id');
                const currentStatus = [[${item.status}]];
                const newStatus = currentStatus === 0 ? 1 : 0;
                
                if (confirm('确定要更新物品状态吗？')) {
                    $.ajax({
                        url: '/items/update-status',
                        method: 'POST',
                        data: {
                            itemId: itemId,
                            status: newStatus
                        },
                        success: function(response) {
                            if (response.success) {
                                alert('状态更新成功！');
                                location.reload();
                            } else {
                                alert('状态更新失败：' + response.message);
                            }
                        },
                        error: function() {
                            alert('请求失败，请稍后重试');
                        }
                    });
                }
            });
            
            // 删除按钮点击事件
            $('#deleteBtn').on('click', function() {
                const itemId = $(this).data('item-id');
                
                if (confirm('确定要删除此物品吗？删除后无法恢复！')) {
                    $.ajax({
                        url: '/items/delete',
                        method: 'POST',
                        data: {
                            itemId: itemId
                        },
                        success: function(response) {
                            if (response.success) {
                                alert('删除成功！');
                                window.location.href = '/items';
                            } else {
                                alert('删除失败：' + response.message);
                            }
                        },
                        error: function() {
                            alert('请求失败，请稍后重试');
                        }
                    });
                }
            });
            
            // 收藏按钮点击事件（未来功能）
            $('#collectBtn').on('click', function() {
                alert('收藏功能正在开发中，敬请期待！');
            });
            
            // 分享按钮点击事件（未来功能）
            $('#shareBtn').on('click', function() {
                if (navigator.share) {
                    navigator.share({
                        title: document.title,
                        text: '校园失物招领平台',
                        url: window.location.href
                    });
                } else {
                    // 复制链接到剪贴板
                    const tempInput = $('<input>');
                    $('body').append(tempInput);
                    tempInput.val(window.location.href).select();
                    document.execCommand('copy');
                    tempInput.remove();
                    alert('链接已复制到剪贴板！');
                }
            });
        });
        
        // 打开图片模态框（简单实现）
        function openImageModal(imageUrl) {
            window.open(imageUrl, '_blank');
        }
    </script>
</body>
</html>
